    <meta charset="UTF-8" />

    <!-- ── Primary Meta ── -->

    <meta name="theme-color" content="#0a0a1a" />
    <link rel="canonical" href="https://marketingstuffs.site/" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marketingstuffs.site/" />
    <meta property="og:site_name" content="Marketingstuffs" />
    <meta property="og:title" content="Marketingstuffs — Free AI Content & Growth Platform" />
    <meta property="og:description" content="Write blogs, build websites, and dominate social media — all guided by AI, all completely free. Marketingstuffs turns your ideas into professional content in minutes." />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Marketingstuffs — Free AI Content & Growth Platform" />
    <meta name="twitter:description" content="Write blogs, build websites, and create social media content with AI — 100% free. No card required." />
    <meta name="twitter:image" content="https://marketingstuffs.site/opengraph.jpg" />
    <meta name="twitter:image:alt" content="Marketingstuffs AI Platform" />

    <!-- ── Favicon & Icons ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── Structured Data: Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Marketingstuffs",
      "url": "https://marketingstuffs.site",
      "logo": "https://marketingstuffs.site/favicon.svg",
      "description": "Marketingstuffs is a free AI-powered content and growth platform for businesses. Write blogs, build websites, and manage social media with AI.",
      "sameAs": [
        "https://twitter.com/MarketingstuffsAI"
      ]
    }
    </script>

    <!-- ── Structured Data: SoftwareApplication ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Marketingstuffs",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://marketingstuffs.site",
      "description": "AI-powered platform for blog writing, website building, and social media content creation. 100% free to use.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free plan — full access to all AI tools"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "2847",
        "bestRating": "5",
        "worstRating": "1"
      },
      "featureList": [
        "AI Blog Writer with SEO optimization",
        "AI Website Builder",
        "Social Media Content Generator",
        "Image Generation via AI",
        "Multi-platform social scheduling"
      ]
    }
    </script>

    <!-- ── Structured Data: WebSite + Sitelinks Searchbox ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Marketingstuffs",
      "url": "https://marketingstuffs.site",
      "description": "Free AI Content & Growth Platform — Blog Writer, Website Builder, Social Media Manager",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://marketingstuffs.site/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Structured Data: FAQPage ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Marketingstuffs really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Marketingstuffs uses free-tier AI models to power all tools. You can write blogs, build websites, and create social media content without paying anything or adding a credit card."
          }
        },
        {
          "@type": "Question",
          "name": "What AI models does Marketingstuffs use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Marketingstuffs uses a chain of top-tier free models including Google Gemma, Llama 3.3 70B, Qwen, and NVIDIA Nemotron via OpenRouter, with automatic fallback to ensure reliable results."
          }
        },
        {
          "@type": "Question",
          "name": "Can Marketingstuffs write SEO-optimized blog posts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The AI Blog Writer generates keyword-rich, structured blog posts with proper headings, meta descriptions, and naturally integrated keywords — fully optimized for search engines."
          }
        },
        {
          "@type": "Question",
          "name": "Does Marketingstuffs build complete websites?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The AI Website Builder creates a full multi-section website — hero, about, services, portfolio, testimonials, and contact — based on your business type and brand in minutes."
          }
        },
        {
          "@type": "Question",
          "name": "Which social media platforms does Marketingstuffs support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Marketingstuffs generates tailored content for Instagram, Facebook, LinkedIn, X (Twitter), TikTok, and Pinterest — with platform-specific tone, length, and hashtag strategies."
          }
        }
      ]
    }
    </script>
